<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TravelMatch — compañeros de viaje, chat y rutas con IA. Encuentra tu próximo destino." />
    <meta name="theme-color" content="#a0c1b9" />
    <title>TravelMatch · Viajes e IA</title>
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              travel: {
                primary: '#a0c1b9',   // Sage Green
                secondary: '#f4e8c1', // Cream/Pale Yellow
                accent: '#70a0af',    // Slate Blue/Teal
                dark: '#2c3e50',
                light: '#f9f9f9'
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both',
              'tm-toast-in': 'tmToastIn 0.38s cubic-bezier(0.22, 1, 0.36, 1) both',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(14px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              tmToastIn: {
                '0%': { opacity: '0', transform: 'translateY(12px) scale(0.98)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
            },
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
