services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: studymatch-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - studymatch-net

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: studymatch-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/studymatch
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      - mongo
    networks:
      - studymatch-net
  mongo:
    image: mongo:4.4
    container_name: studymatch-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: studymatch
    volumes:
      - mongo_data:/data/db
    networks:
      - studymatch-net
    
volumes:
  mongo_data:

networks:
  studymatch-net:
    driver: bridge




